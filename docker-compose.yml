services:
  personal-site:
    build: .
    container_name: personal-site
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      - site-data:/data
    cpus: 1.0
    mem_limit: 1g
    pids_limit: 256

volumes:
  site-data:
    name: personal-site-data

# Update: git pull --ff-only && docker compose up -d --build
# The named volume preserves the database and uploads.
