services:
  personal-site:
    build: .
    container_name: personal-site
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - site-data:/data

volumes:
  site-data:
    name: personal-site-data

# Update: git pull --ff-only && docker compose up -d --build
# The named volume preserves the database and uploads.
