<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="nxksxd — персональный сайт, проекты и блог" />
    <meta name="author" content="Nikita Syromyatnikov" />
    <meta name="copyright" content="© 2024 Nikita Syromyatnikov. All rights reserved." />
    <meta name="theme-color" content="#0f0f12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="nxksxd" />
    <meta property="og:title" content="nxksxd — блог и проекты" />
    <meta property="og:description" content="nxksxd — персональный сайт, проекты и блог" />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="nxksxd — блог и проекты" />
    <meta name="twitter:description" content="nxksxd — персональный сайт, проекты и блог" />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Prevent theme flash (FOUC): apply saved/preferred theme before paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme =
            saved ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>nxksxd — блог и проекты</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
